
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILIZ GLOBAL | Excellence Import-Export</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #050505;
            --card: #121212;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; line-height: 1.6; }

        /* HEADER LUXE */
        header {
            padding: 20px 5%;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area h1 { font-family: 'Playfair Display', serif; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        
        .contact-top { color: var(--gold); font-weight: bold; text-decoration: none; font-size: 1.1rem; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 5px; }

        /* HERO SECTION */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .hero h2 { font-size: 3rem; font-family: 'Playfair Display', serif; margin-bottom: 10px; }
        .hero p { color: var(--gold); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; }

        /* GRILLE PRODUITS */
        .container { padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.4s;
            position: relative;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }

        .img-box { height: 250px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-width: 90%; max-height: 80%; object-fit: contain; }

        .info { padding: 20px; text-align: center; }
        .info h3 { margin-bottom: 10px; font-size: 1.2rem; }
        .price { color: var(--gold); font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; display: block; }

        /* BOUTON WHATSAPP */
        .btn-order {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-order:hover { background: var(--white); transform: scale(1.05); }

        /* FOOTER */
        footer { padding: 50px 5%; background: #000; border-top: 1px solid #222; text-align: center; }
