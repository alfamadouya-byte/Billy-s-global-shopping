<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billy’s Global</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #ff6600;
    color: white;
    padding: 15px;
    text-align: center;
}

.search {
    padding: 20px;
    text-align: center;
}

.search input {
    width: 80%;
    padding: 10px;
    font-size: 16px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 15px;
}

.product {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>Billy’s Global</h1>
    <p>Le pont entre la Chine et l’Afrique</p>
</header>

<div class="search">
    <input type="text" placeholder="Rechercher un produit...">
</div>

<div class="products">

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>iPhone 13</h3>
        <p>Prix : 4 500 000 GNF</p>
        <button onclick="commander('iPhone 13')">Commander</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Chaussures Nike</h3>
        <p>Prix : 350 000 GNF</p>
        <button onclick="commander('Chaussures Nike')">Commander</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Nouilles Importées</h3>
        <p>Prix : 25 000 GNF</p>
        <button onclick="commander('Nouilles Importées')">Commander</button>
    </div>

</div>

<script>
function commander(produit) {
    let numero = "224XXXXXXXX";
    let message = "Bonjour, je veux commander : " + produit;
    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(message);
    window.open(url, '_blank');
}
</script>

</body>
</html>
